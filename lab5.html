<!DOCTYPE html>
<html lang="en">
<head>
  <title>Kiara's Gym Registration</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      background-color: #b39cc7;
      display: flex;
    }

    ul li a {
      display: block;
      color: white;
      padding: 14px 16px;
      text-decoration: none;
    }

    ul li a.active {
      background-color: #dcbdd3;
    }
  </style>

  <script>
    function register() 
    {

      var first = document.getElementById("first").value;
      var last = document.getElementById("last").value;
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      var dob = document.getElementById("dob").value;

      if (first == "" || last == "" || email == "" || password == "" || dob == "") 
      {
        document.getElementById("output").innerHTML = "Make sure to fill in all fields!";
        return;
      }

      if (!(password.includes("!") || password.includes("?"))) 
      {
        document.getElementById("output").innerHTML = "Your password must contain ! or ?";
        return;
      }

      var user = 
      {
        firstName: first,
        lastName: last,
        email: email,
        password: password,
        dob: dob
      };

      var stars = "";
      for (var i = 0; i < user.password.length; i++) 
      {
        stars += "*";
      }
      user.password = stars;

      document.getElementById("output").innerHTML =
        "<h3>Gym Registration Successful!</h3>" +
        "Welcome to the best gym experience, " + user.firstName + "! <br><br>" +
        "First Name: " + user.firstName + "<br>" +
        "Last Name: " + user.lastName + "<br>" +
        "Email: " + user.email + "<br>" +
        "Password: " + user.password + "<br>" +
        "Date of Birth: " + user.dob;
    }
  </script>
</head>

<body>

<ul>
  <li><a href="#home">Home</a></li>
  <li><a href="https://kiaragar.github.io/README.md">Lab 1</a></li>
  <li><a href="https://kiaragar.github.io/index.html">Lab 2</a></li>
  <li><a href="https://kiaragar.github.io/lab3.html">Lab 3</a></li>
  <li><a href="https://kiaragar.github.io/lab4.html">Lab 4</a></li>
  <li><a class="active"href="#">Lab 5</a></li>
</ul>

<div class="container">
  <h2>Join My All Girl Gym!</h2>
  <p>Enjoy working out in the most comfortable fitness environment today!</p>

  <input id="first" class="form-control" placeholder="First Name"><br>
  <input id="last" class="form-control" placeholder="Last Name"><br>
  <input id="email" class="form-control" placeholder="Email"><br>
  <input id="password" type="password" class="form-control" placeholder="Create Password (containing ! or ?)"><br>
  <input id="dob" type="date" class="form-control"><br>

  <button class="btn btn-primary" onclick="register()">Join Now</button>

  <div id="output" style="margin-top:20px;"></div>
</div>

<hr>
<p>
  March 16, 2026 <br>
  Created by: Kiara Garcia
</p>

</body>
</html>
